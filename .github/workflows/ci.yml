name: CI / CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '18'
  NEXT_PUBLIC_SIMULATE_LATENCY: 'false'   # disable latency in CI for speed

# Cancel in-flight runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────
  # Job 1: Type-check + Lint  (fast gate — fails fast)
  # ───────────────────────────────────────────────────────────
  quality:
    name: 🔍 Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — strict type check
        run: npx tsc --noEmit
        # Fails if any type error exists (strict mode in tsconfig)

      - name: ESLint — zero warnings policy
        run: npx next lint --max-warnings=0
        # Any lint warning = CI failure. No warnings allowed in main.

  # ───────────────────────────────────────────────────────────
  # Job 2: Unit Tests + Coverage
  # ───────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        continue-on-error: true   # Don't block if coverage comment fails

  # ───────────────────────────────────────────────────────────
  # Job 3: Build + Bundle Audit
  # ───────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build & Bundle Audit
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_SIMULATE_LATENCY: 'false'
          NEXT_PUBLIC_API_URL: ''

      - name: Check initial JS bundle size (< 250KB budget)
        run: |
          echo "=== Bundle Size Report ==="
          find .next/static/chunks -name "*.js" -not -name "*.map" \
            -exec ls -lh {} \; | sort -k5 -hr | head -20

          # Compute total of largest chunks (first-load JS budget)
          TOTAL=$(find .next/static/chunks/pages -name "*.js" -not -name "*.map" \
            2>/dev/null | xargs wc -c 2>/dev/null | tail -1 | awk '{print $1}' || echo 0)
          BUDGET=256000  # 250KB
          echo "First-load JS: ${TOTAL} bytes (budget: ${BUDGET})"
          if [ "$TOTAL" -gt "$BUDGET" ] 2>/dev/null; then
            echo "❌ Bundle exceeds budget!"
            exit 1
          else
            echo "✅ Bundle within budget"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: |
            .next/
            !.next/cache
          retention-days: 3

  # ───────────────────────────────────────────────────────────
  # Job 4: Deploy Preview (PRs) — Vercel preview URL
  # ───────────────────────────────────────────────────────────
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    environment: preview
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project via Vercel
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (preview)
        id: vercel-deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Deployment\n\n✅ Deployed: ${{ steps.vercel-deploy.outputs.preview-url }}\n\nCommit: \`${{ github.sha }}\``
            })

  # ───────────────────────────────────────────────────────────
  # Job 5: Deploy Production (main branch only)
  # ───────────────────────────────────────────────────────────
  deploy-production:
    name: 🌍 Deploy Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project via Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test — homepage returns 200
        run: |
          sleep 20
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" ${{ secrets.PRODUCTION_URL }})
          echo "Homepage status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Smoke test — API health
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ secrets.PRODUCTION_URL }}/api/products?limit=1")
          echo "API status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1